apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swap-core.fullname" . }}-controller
  labels:
    app.kubernetes.io/name: {{ include "swap-core.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "swap-core.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "swap-core.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc-mtls
              containerPort: 10443
              protocol: TCP
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- range .Values.securityContext.capabilities.drop }}
                - {{ . }}
                {{- end }}
            seccompProfile:
              type: {{ .Values.securityContext.seccompProfile.type }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: certs
              mountPath: {{ .Values.volumes.certs.mountPath }}
              readOnly: true
            - name: plugins
              mountPath: {{ .Values.volumes.plugins.mountPath }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            grpc:
              port: 10443
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 10443
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.volumes.certs.secretName }}
        - name: plugins
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
